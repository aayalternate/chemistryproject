<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Reaction Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="home-page" class="view">
        <img src="images/Logo.PNG" alt="ChemLab Logo" style="height: 100px; position: absolute; top: 2.5rem; left: 43rem; z-index: 999; opacity: 0.20;">
        <header class="app-header">
            <h1>Addition Reaction Lab</h1>
            <p>Select two functional groups to see how they react</p>
        </header>

        <div id="element-grid" class="grid"></div>

        <div class="dock">
            <button id="combine-btn" disabled>Combine Functional Groups</button>
        </div>
    </main>

    <main id="result-page" class="view hidden">
    <div class="result-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="back-btn" onclick="goToHome()">← Reset Addition Reaction Lab</button>
            <img src="images/Logo.PNG" alt="ChemLab Logo" style="height: 100px; opacity: 0.2;">
        </div>
            <h2 id="reaction-name">Reaction</h2>
            <div class="formula-display">
                <span id="formula-text"></span>
            </div>
            <div class="info-section">
                <h3>Scientific Explanation</h3>
                <p id="reaction-info"></p>
                <div class="fun-fact">
                    <strong>Pro Tip:</strong> <span id="reaction-fact"></span>
                </div>
            </div>
        </div>
    </main>

    <script src="elements.js"></script>
    <script src="script.js"></script>
</body>
</html>
